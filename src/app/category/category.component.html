<form [formGroup]="_newMasterCategoryForm" (ngSubmit)="onSubmitMaster()">
    <fieldset>
        <legend>Add new master category</legend>
        <div>
            <label>Master category name</label><input formControlName="master_category_name">
        </div>
        <button type="submit">Create master category</button>
    </fieldset>
</form>
<form [formGroup]="_newCategoryForm" (ngSubmit)="onSubmit()">
    <fieldset>
        <legend>Add new category</legend>
        <div>
            <label>Category name</label><input formControlName="category_name">
        </div>
        <select formControlName="id_parent">
            @for (item of (_parentCategories | keyvalue); track item.key) {
            <option [value]="item.key">{{ item.value }}</option>
            }
        </select>
        <button type="submit">Create category</button>
    </fieldset>
</form>
<fieldset>
    <legend>List of categories</legend>
    @for (parent of (_parentCategories | keyvalue); track parent.key) {
    <div>{{ parent.value }}</div>
        @for (category of _categories.get(parent.key); track category.id) {
        <div>{{ category.name }}</div>
        }
    }
</fieldset>
