<form [formGroup]="_newAccountForm" (ngSubmit)="onSubmit()">
    <div class="form-field">
        <label>Account name</label><input name="account_name" formControlName="accountName">
    </div>
    <label for="dropdown">Account type</label>
    <select id="dropdown" formControlName="selectedAccountType">
        @for (accType of _accountTypes; track accType) {
        <option [value]="accType.value">{{ accType.label }}</option>
        }
    </select>

    <button type="submit">Create</button>
</form>
