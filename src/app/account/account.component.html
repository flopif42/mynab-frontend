<form [formGroup]="createAccountForm" (ngSubmit)="onSubmit()">
    <fieldset>
        <legend>Add account</legend>
        <div class="form-field">
            <label>Account name</label><input name="name_account" formControlName="name_account">
        </div>
    </fieldset>
    <div class="form-buttons">
        <button class="button button-primary" [disabled]="!createAccountForm.valid">Sign up</button>
    </div>
</form>
