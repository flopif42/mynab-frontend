<form [formGroup]="createAccountForm" (ngSubmit)="onSubmit()">
    <fieldset>
        <legend>Add account</legend>
        <div class="form-field">
            <label>Account name</label><input name="account_name" formControlName="account_name">
        </div>
    </fieldset>
    <div class="form-buttons">
        <button class="button button-primary" [disabled]="!createAccountForm.valid">Create</button>
    </div>
</form>
{{ _accountList }}
@for (item of _accountList; track item._name) {
<li>{{ item._name }} | {{ item._type }}</li>
} @empty {
<li>There are no items.</li>
}
