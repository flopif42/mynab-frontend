<form [formGroup]="myForm" (ngSubmit)="onSubmit()">
    <label for="dropdown">Choose an option:</label>
    <select id="dropdown" formControlName="selectedOption">
        <option *ngFor="let name of names" [value]="name">
            {{ name }}
        </option>
        <option value="plop">test 1 2 3</option>
    </select>

    <!-- Optional: Show the selected value -->
    <div>
        You selected: {{ myForm.get('selectedOption').value }}
    </div>

    <button type="submit">Submit</button>
</form>
