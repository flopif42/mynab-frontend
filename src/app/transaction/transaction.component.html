<div>Transactions</div>
<form [formGroup]="m_newTransactionForm" (ngSubmit)="onSubmit()">
    <input id="id_trans" type="hidden" formControlName="id_trans" value="0">
    <table>
        <tr><th>Account</th><th>Date</th><th>Payee</th><th>Memo</th><th>Amount</th></tr>
        @for (trs of this.m_transactions; track trs.id_trans) {
        <tr>
            <td>{{ trs.id_account }}</td>
            <td>{{ trs.date_trans }}</td>
            <td>{{ trs.id_payee }}</td>
            <td>{{ trs.memo_trans }}</td>
            <td>{{ trs.amount }}</td>
            <td>&nbsp;</td>
        </tr>
        }
        <tr>
            <td><input id="id_account" type="text" formControlName="id_account"></td>
            <td><input id="date_trans" type="text" formControlName="date_trans"></td>
            <td><input id="id_payee" type="text" formControlName="id_payee"></td>
            <td><input id="memo_trans" type="text" formControlName="memo_trans"></td>
            <td><input id="amount" type="text" formControlName="amount"></td>
            <td><button type="submit">Submit</button></td>
        </tr>
    </table>
</form>
{{ this.errorMessage }}
