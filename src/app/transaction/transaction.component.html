<div>Transactions</div>
<table>
    @for (trs of this.m_transactions; track trs.id_trans) {
    <th>
        <td>Account</td>
        <td>Date</td>
        <td>Payee</td>
        <td>Memo</td>
        <td>Amount</td>
    </th>
    <tr>
        <td>{{ trs.id_account }}</td>
        <td>{{ trs.date_trans }}</td>
        <td>{{ trs.id_payee }}</td>
        <td>{{ trs.memo_trans }}</td>
        <td>{{ trs.amount }}</td>
    </tr>
    }
</table>
<div>Fin</div>
