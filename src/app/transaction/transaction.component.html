<div>Transactions</div>
<table>
    <tr><th>Account</th><th>Date</th><th>Payee</th><th>Memo</th><th>Amount</th></tr>
    @for (trs of this.m_transactions; track trs.id_trans) {
    <tr>
        <td>{{ trs.id_account }}</td>
        <td>{{ trs.date_trans }}</td>
        <td>{{ trs.id_payee }}</td>
        <td>{{ trs.memo_trans }}</td>
        <td>{{ trs.amount }}</td>
    </tr>
    }
</table>

<form [formGroup]="m_newTransactionForm" (ngSubmit)="onSubmit()">
    <label for="id_account">Account: </label><input id="id_account" type="text" formControlName="id_account">
    <label for="memo_trans">Memo: </label><input id="memo_trans" type="text" formControlName="memo_trans">
    <button type="submit">Submit</button>
</form>
